name: catfish_disease_detector
description: AI-Based Image Detection of Catfish Diseases with Real-Time Monitoring for Backyard Farmers

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.18.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  image: ^4.1.3
  # RPi camera integration only
  http: ^1.1.0
  video_player: ^2.8.1
  chewie: ^1.7.4
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

platforms:
  android:
  windows:
